<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./images/favicon-32x32.png" type="image/x-icon">
  <link rel="stylesheet" href="./src/style.css">
  <script type="module" src="./src/main.js"></script>
  <title>Calculator App</title>
</head>

<body class="flex min-h-svh flex-col items-center bg-main-background px-6 py-[clamp(1rem,3svh,3rem)] font-league-spartan font-bold transition-colors duration-200">
  <header class="mb-[clamp(0.75rem,2svh,2rem)] flex w-full max-w-125 items-center justify-between">
    <div>
      <h1 class="text-main text-4xl [@media(max-height:640px)]:text-3xl">calc</h1>
    </div>
    <div class="flex gap-x-6">
      <div class="self-end">
        <h2 class="text-main ">THEME</h2>
      </div>
      <div class="self-end">
        <div class="text-main w-full flex justify-around"><span>1</span><span>2</span><span>3</span></div>
        <div>
          <button id="toggle-btn" class="w-15 h-5.5 relative rounded-full bg-secondary-background transition-colors duration-200 focus:outline-2 focus:outline-offset-4 focus:outline-toggle-key-background" type="button" aria-label="Switch color theme. Current theme: dark">
            <span id="toggle-btn-inner" class="absolute w-3.5 h-3.5 top-1 left-1 rounded-full bg-toggle-key-background transition-[left,background-color] duration-250 ease-in-out"></span>
          </button>
        </div>
      </div>
    </div>
  </header>
  <main class="w-full max-w-125">
    <section class="mb-[clamp(0.75rem,2svh,1.5rem)]">
      <label for="input" class="sr-only">Calculator display</label>
      <input type="text" id="input" class="min-h-[clamp(4rem,14svh,7.5rem)] w-full rounded-xl bg-screen-background px-7 py-[clamp(0.875rem,2.4svh,1.25rem)] text-end text-5xl text-main transition-colors duration-200 focus:outline-none [@media(max-height:640px)]:text-[2.5rem]" readonly tabindex="-1" aria-live="polite">
    </section>
    <section class="grid w-full grid-cols-4 grid-rows-5 gap-[clamp(0.5rem,1.5svh,0.875rem)] rounded-xl bg-secondary-background p-[clamp(1rem,3svh,1.75rem)] transition-colors duration-200" aria-label="Calculator keypad">
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="7">7</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="8">8</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="9">9</button>
      <button type="button" id="del-btn" class="flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-main-key-shadow bg-main-key-background py-0 text-center text-xl text-action-text transition-colors duration-200 hover:border-main-key-background hover:bg-main-key-hover [@media(max-height:640px)]:text-lg">DEL</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="4">4</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="5">5</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="6">6</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="+">+</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="1">1</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="2">2</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="3">3</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="-">-</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num=".">.</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="0">0</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="/" aria-label="Divide">/</button>
      <button type="button" class="btn flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-secondary-key-shadow bg-secondary-key-background py-0 text-center text-4xl text-secondary transition-colors duration-200 hover:bg-secondary-key-hover [@media(max-height:640px)]:text-3xl" data-num="*" aria-label="Multiply">x</button>
      <button type="button" id="reset" class="col-span-2 flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-main-key-shadow bg-main-key-background py-0 text-center text-xl text-action-text transition-colors duration-200 hover:border-main-key-background hover:bg-main-key-hover [@media(max-height:640px)]:text-lg">RESET</button>
      <button type="button" id="calculate-btn" class="col-span-2 flex min-h-[clamp(2.875rem,8.6svh,4rem)] cursor-pointer items-center justify-center rounded-lg border-b-6 border-toggle-key-shadow bg-toggle-key-background py-0 text-center text-3xl text-equal-text transition-colors duration-200 hover:border-toggle-key-background hover:bg-toggle-key-hover [@media(max-height:640px)]:text-3xl">=</button>
    </section>
  </main>
</body>

</html>
